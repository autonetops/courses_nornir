# --- Dimensao PLATAFORMA (platform + connection_options) ---
ios:
  platform: cisco_xe
  connection_options:
    netmiko:
      platform: cisco_xe
      extras:
        conn_timeout: 30

eos:
  platform: arista_eos
  connection_options:
    netmiko:
      platform: arista_eos
      extras:
        conn_timeout: 30

f5:
  platform: f5_bigip
  data:
    api_only: true          # sem CLI (API-only)

# --- Dimensao SITE ---
site_poa:
  data:
    site: poa
    region: sul
site_gru:
  data:
    site: gru
    region: sudeste

# --- Dimensao PAPEL ---
edge:
  data:
    role: edge
core:
  data:
    role: core
lb:
  data:
    role: lb
