# nornir-lab/.gitlab-ci.yml
# Pipeline GitOps do nornir-lab. Roda num runner compartilhado com executor
# docker; a imagem base e python:3.12-slim (mesma minor do sandbox). As
# dependencias vem do requirements.txt fixado; o ruff, que nao e dep de
# runtime, e instalado a parte, so no job de lint.

stages:
  - lint
  - test
  - dry-run
  - deploy

default:
  image: python:3.12-slim

variables:
  # Cache do pip dentro do workspace do projeto, para o `cache:` reaproveitar.
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  key:
    files:
      - requirements.txt
  paths:
    - .cache/pip

# Template oculto (nao vira job): instala o stack fixado antes do script.
# Jobs que precisam do Nornir/pytest herdam com `extends`.
.instala-stack:
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt

# 1) lint — ruff (nao precisa do stack: analise estatica, nao importa nada).
lint:
  stage: lint
  script:
    - pip install "ruff==0.9.10"
    - ruff check .
    - ruff format --check .

# 2) test — a suite pytest do Cap. 4: 17 verdes, sem device, sem credenciais.
test:
  stage: test
  extends: .instala-stack
  script:
    - python -m pytest tests/ -q

# 3) dry-run — deploy.py SEM --commit: calcula o diff e o publica como
#    artefato. As credenciais vem das variaveis protegidas do projeto
#    (Settings > CI/CD > Variables): NORNIR_USER, NORNIR_PASS.
dry-run:
  stage: dry-run
  extends: .instala-stack
  script:
    # pipefail: se o deploy.py falhar (exit 1/2), o job falha — o `tee` sozinho
    # mascararia o exit code. A disciplina de exit codes do Cap. 4 vale aqui.
    - set -o pipefail
    - python deploy.py | tee diff-report.txt
  artifacts:
    name: "diff-$CI_COMMIT_SHORT_SHA"
    paths:
      - diff-report.txt
    when: always
    expire_in: 1 week

# 4) deploy — deploy.py --commit. Portao MANUAL e so na main protegida:
#    ninguem muda a rede sem revisar o diff e clicar em "play".
deploy:
  stage: deploy
  extends: .instala-stack
  script:
    - python deploy.py --commit
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
  environment:
    name: production
